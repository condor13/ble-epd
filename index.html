<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATC Retro Pager</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --primary: #3498db; --secondary: #2ecc71; --pager-bg: #1a1a1a; --lcd: #9ead86; }
        body { font-family: 'Courier New', monospace; background: #2c3e50; margin: 0; padding: 15px; color: white; }
        .pager-case { background: var(--pager-bg); border-radius: 20px; padding: 20px; border: 4px solid #333; box-shadow: 0 10px 0 #000; max-width: 400px; margin: auto; }
        .lcd-screen { background: var(--lcd); color: #222; padding: 15px; border-radius: 5px; border: 4px inset #777; min-height: 80px; margin-bottom: 20px; font-weight: bold; font-size: 1.2rem; text-transform: uppercase; }
        
        button { 
            width: 100%; padding: 15px; margin: 5px 0; border: none; border-radius: 50px; 
            font-weight: bold; cursor: pointer; background: #444; color: white; box-shadow: 0 4px 0 #222;
        }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #222; }
        .btn-connect { background: var(--primary); }
        .btn-send { background: var(--secondary); color: #111; }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; font-size: 1rem; }
        #status { font-size: 0.7rem; color: #888; text-align: center; margin-top: 10px; }
        #log { font-size: 0.6rem; color: #666; height: 40px; overflow: hidden; margin-top: 10px; }
        canvas { display: none; } /* Hidden canvas for text processing */
    </style>
</head>
<body>

    <div class="pager-case">
        <div class="lcd-screen" id="display-preview">READY...</div>
        
        <button id="connectbutton" class="btn-connect" onclick="preConnect();">POWER ON / CONNECT</button>
        
        <input type="text" id="pagerMsg" placeholder="ENTER MESSAGE..." maxlength="20" oninput="updatePreview()">
        <button class="btn-send" onclick="sendPagerText();">📟 SEND PAGE</button>
        
        <div id="status">OFFLINE</div>
        <div id="log"></div>
    </div>

    <canvas id="textCanvas" width="250" height="122"></canvas>

<script>
        let writeChar;
        const SERVICE_UUID = '13187b10-eba9-a3ba-044e-83d3217d9a38';
        const CHAR_UUID = '4b646063-6264-f3a7-8941-e65356ea82fe';

        function updatePreview() {
            document.getElementById('preview').innerText = document.getElementById('msgInput').value || "READY...";
        }

        function addLog(msg) { document.getElementById('log').innerText = msg; }

        async function connect() {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'ATC' }],
                    optionalServices: [SERVICE_UUID]
                });
                addLog("Connecting...");
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                writeChar = await service.getCharacteristic(CHAR_UUID);
                addLog("PAGER ONLINE");
                document.getElementById('connBtn').innerText = "ONLINE";
            } catch (e) { addLog("Error: " + e.message); }
        }

        async function generateAndSend() {
            if (!writeChar) return addLog("CONNECT FIRST!");
            
            const canvas = document.getElementById('engine');
            const ctx = canvas.getContext('2d');
            const text = document.getElementById('msgInput').value;

            // Draw: Black Background, White Text (This often works better for inversion issues)
            ctx.fillStyle = "black"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            ctx.font = "bold 40px Arial";
            ctx.textAlign = "center";
            ctx.fillText(text, canvas.width/2, canvas.height/2 + 15);

            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            let hexString = "";
            
            // Core Logic: We are packing 8 pixels into 1 byte
            for (let i = 0; i < imgData.length; i += 4 * 8) {
                let byte = 0;
                for (let bit = 0; bit < 8; bit++) {
                    // INVERSION LOGIC: If pixel is bright (>128), set the bit
                    if (imgData[(i + bit * 4)] > 128) {
                        byte |= (1 << (7 - bit));
                    }
                }
                hexString += byte.toString(16).padStart(2, '0');
            }

            try {
                addLog("Waking tag...");
                await writeChar.writeValue(new Uint8Array([0x00, 0x00])); 
                await writeChar.writeValue(new Uint8Array([0x02, 0x00, 0x00])); 

                const step = 480; 
                for (let i = 0; i < hexString.length; i += step) {
                    // Header: 03 (Data) + 01 (Buffer Type) + Address (2 bytes)
                    let part = "0301" + intToHex16(i/2) + hexString.substring(i, i + step);
                    await writeChar.writeValue(hexToBytes(part));
                    addLog("Paging... " + Math.round((i/hexString.length)*100) + "%");
                }

                addLog("Finalizing...");
                // Refresh command 0101 triggers the hardware
                await writeChar.writeValue(new Uint8Array([0x01, 0x01])); 
                addLog("MESSAGE SENT");
            } catch (e) { addLog("Pager Error: " + e.message); }
        }

        function intToHex16(val) {
            let h = val.toString(16).padStart(4, '0');
            return h.substring(2,4) + h.substring(0,2); // Little Endian
        }

        function hexToBytes(hex) {
            let bytes = [];
            for (let c = 0; c < hex.length; c += 2) bytes.push(parseInt(hex.substr(c, 2), 16));
            return new Uint8Array(bytes);
        }
    </script>
</body>

</html>
