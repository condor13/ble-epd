<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>S24 Pager Control</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="dithering.js"></script>
    <script src="utils.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1b; color: #e0e0e0; text-align: center; padding: 20px; margin: 0; }
        h2 { color: #00d4ff; font-weight: 300; margin-bottom: 20px; }
        
        /* Container for Canvas & Settings */
        .preview-box { position: relative; display: inline-block; width: 100%; max-width: 296px; }
        canvas { background: white; border: 4px solid #333; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; height: auto; image-rendering: pixelated; }
        
        /* Settings Gear */
        .settings-btn { position: absolute; top: -10px; right: -10px; background: #333; border: 1px solid #444; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #aaa; z-index: 10; }
        .settings-btn:hover { color: #fff; background: #444; }

        #progressContainer { width: 90%; max-width: 400px; background: #333; height: 8px; border-radius: 4px; margin: 15px auto; overflow: hidden; display: none; }
        #progressBar { width: 0%; height: 100%; background: #00d4ff; transition: width 0.2s; }

        textarea { width: 90%; max-width: 400px; height: 100px; padding: 15px; font-size: 1.1rem; border-radius: 12px; border: 1px solid #333; background: #2d2d2e; color: white; margin-top: 10px; outline: none; resize: none; }

        .main-btn { width: 90%; max-width: 430px; padding: 18px; margin: 15px 0; font-weight: bold; border-radius: 12px; border: none; cursor: pointer; font-size: 1.2rem; transition: 0.3s; background: #007bff; color: white; box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3); }
        .main-btn.online { background: #28a745; box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3); }
        
        #log { background: #000; color: #00ff00; font-family: monospace; font-size: 11px; padding: 15px; text-align: left; height: 80px; overflow-y: auto; border-radius: 8px; margin: 10px auto; max-width: 400px; border: 1px solid #333; }
    </style>
</head>
<body>

    <h2>📟 S24 PAGER</h2>
    
    <div class="preview-box">
        <div class="settings-btn" onclick="disconnectDevice()" title="Change Device">⚙️</div>
        <canvas id="canvas" width="296" height="128"></canvas>
    </div>
    
    <div id="progressContainer">
        <div id="progressBar"></div>
    </div>
    
    <textarea id="msgInput" placeholder="Enter message..." oninput="drawText()"></textarea>
    
    <button class="main-btn" id="actionBtn" onclick="handleAction()">CONNECT PAGER</button>

    <div id="log">System: Ready</div>

    <script>
        let bleDevice, gattServer, epdService, epdCharacteristic;
        const SERVICE_UUID = '13187b10-eba9-a3ba-044e-83d3217d9a38';
        const CHAR_UUID = '4b646063-6264-f3a7-8941-e65356ea82fe';

        function addLog(m) {
            const l = document.getElementById('log');
            l.innerHTML += `> ${m}<br>`;
            l.scrollTop = l.scrollHeight;
        }

        async function handleAction() {
            if (!bleDevice || !bleDevice.gatt.connected) {
                await connectPager();
            } else {
                await upload_image();
            }
        }

        async function connectPager() {
            try {
                addLog("Searching for S24 Devices...");
                bleDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'S24_' }],
                    optionalServices: [SERVICE_UUID]
                });

                addLog("Connecting to " + bleDevice.name);
                gattServer = await bleDevice.gatt.connect();
                epdService = await gattServer.getPrimaryService(SERVICE_UUID);
                epdCharacteristic = await epdService.getCharacteristic(CHAR_UUID);
                
                // Update Button UI
                const btn = document.getElementById('actionBtn');
                btn.innerText = "SEND TO PAGER";
                btn.classList.add('online');
                addLog("Pager Online.");

                bleDevice.addEventListener('gattserverdisconnected', onDisconnected);
            } catch (e) {
                addLog("Error: " + e.message);
            }
        }

        function onDisconnected() {
            const btn = document.getElementById('actionBtn');
            btn.innerText = "RECONNECT PAGER";
            btn.classList.remove('online');
            addLog("Device Disconnected.");
        }

        async function disconnectDevice() {
            if (bleDevice && bleDevice.gatt.connected) {
                await bleDevice.gatt.disconnect();
            }
            addLog("Connection Reset. You can pick a new device.");
            await connectPager();
        }

        function drawText() {
            const c = document.getElementById('canvas');
            const ctx = c.getContext('2d');
            const input = document.getElementById('msgInput').value || "S24 PAGER READY";
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, c.width, c.height);
            
            // Envelope Icon
            const iconX = c.width - 35, iconY = 12;
            ctx.strokeStyle = "black"; ctx.lineWidth = 2;
            ctx.strokeRect(iconX, iconY, 22, 14); 
            ctx.beginPath(); ctx.moveTo(iconX, iconY); ctx.lineTo(iconX + 11, iconY + 7); ctx.lineTo(iconX + 22, iconY); ctx.stroke();

            // Text
            const fontSize = 26, xOffset = 10;
            ctx.fillStyle = "black";
            ctx.font = `bold ${fontSize}px Arial`;
            ctx.textAlign = "center"; ctx.textBaseline = "middle";

            const maxWidth = c.width - 50, lineHeight = fontSize + 4;
            const inputLines = input.split('\n');
            let lines = [];
            
            inputLines.forEach(line => {
                let words = line.split(' '), tempLine = "";
                for (let n = 0; n < words.length; n++) {
                    let testLine = tempLine + words[n] + " ";
                    if (ctx.measureText(testLine).width > maxWidth && n > 0) {
                        lines.push(tempLine); tempLine = words[n] + " ";
                    } else { tempLine = testLine; }
                }
                lines.push(tempLine);
            });

            const totalHeight = lines.length * lineHeight;
            let startY = (c.height - totalHeight) / 2 + (lineHeight / 2);
            lines.forEach((line, i) => {
                ctx.fillText(line.trim(), (c.width / 2) + xOffset, startY + (i * lineHeight));
            });
        }

        async function upload_image() {
            const canvas = document.getElementById('canvas');
            const bar = document.getElementById('progressBar');
            document.getElementById('progressContainer').style.display = 'block';
            
            try {
                addLog("Uploading...");
                await epdCharacteristic.writeValueWithResponse(hexToBytes("0000")); 
                await epdCharacteristic.writeValueWithResponse(hexToBytes("020000")); 

                const bwData = bytesToHex(canvas2bytes(canvas));
                await sendChunked(bwData, 'ff', 0);
                
                const redData = bytesToHex(canvas2bytes(canvas, 'bwr'));
                await sendChunked(redData, '00', 50);

                await epdCharacteristic.writeValueWithResponse(hexToBytes("0101"));
                addLog("Update Complete.");
                setTimeout(() => { document.getElementById('progressContainer').style.display = 'none'; }, 2000);
            } catch (e) { addLog("Failed: " + e.message); }
        }

        async function sendChunked(value, code, base) {
            const step = 480;
            for (let i = 0; i < value.length; i += step) {
                let cmd = "03" + code + intToHex(i / 2, 2) + value.substring(i, i + step);
                await epdCharacteristic.writeValueWithResponse(hexToBytes(cmd));
                document.getElementById('progressBar').style.width = (base + ((i / value.length) * 50)) + '%';
            }
        }

        drawText();
    </script>
</body>
</html>
