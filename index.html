<!DOCTYPE html>
<html lang="en">
<head>

    <script src="dithering.js"></script>
    <script src="utils.js"></script>
    <style>
        body { font-family: system-ui, sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 20px; }
        #canvas { background: white; border: 2px solid #555; border-radius: 4px; margin-bottom: 20px; max-width: 100%; }
        input { width: 90%; padding: 15px; font-size: 1.2rem; border-radius: 8px; border: 1px solid #444; background: #2a2a2a; color: white; margin-bottom: 15px; }

        .btn-conn { background: #4a4a4a; color: white; }
        .btn-send { background: #0084ff; color: white; }
        #log { font-family: monospace; font-size: 0.75rem; color: #aaa; margin-top: 20px; height: 120px; overflow-y: auto; text-align: left; background: #000; padding: 10px; border-radius: 4px; }
    </style>
</head>

        function addLog(msg) {
            const log = document.getElementById('log');
            log.innerHTML += `> ${msg}<br>`;
            log.scrollTop = log.scrollHeight;
        }

        function drawText() {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            const text = document.getElementById('msgInput').value || "S24 READY";
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "black";
            ctx.font = "bold 36px Arial";
            ctx.textAlign = "center";
            ctx.fillText(text, canvas.width / 2, canvas.height / 2 + 12);
        }
