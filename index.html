<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>S24 Custom Pager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="dithering.js"></script>
    <script src="utils.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: radial-gradient(circle at center, #2c2c2e 0%, #1a1a1b 100%);
            color: #e0e0e0; margin: 0; display: flex; flex-direction: column; 
            align-items: center; min-height: 100vh; padding: 20px;
        }
        .app-container { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 15px; margin-top: 10px; }
        .header-row { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 5px; }
        h2 { color: #00d4ff; font-weight: 300; margin: 0; letter-spacing: 2px; }
        
        .settings-btn-inline { 
            background: #2d2d2e; border: 1px solid #444; border-radius: 8px; 
            width: 36px; height: 36px; cursor: pointer; display: flex; 
            align-items: center; justify-content: center; font-size: 18px; color: #aaa;
        }

        canvas { 
            background: white; border: 4px solid #333; border-radius: 12px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.6); width: 100%; height: auto; 
            image-rendering: pixelated; 
        }

        #progressContainer { width: 100%; background: #333; height: 10px; border-radius: 5px; overflow: hidden; display: none; }
        #progressBar { width: 0%; height: 100%; background: linear-gradient(90deg, #00d4ff, #0084ff); transition: width 0.2s; }

        textarea { 
            width: 100%; height: 100px; padding: 15px; font-size: 1.1rem; 
            border-radius: 14px; border: 1px solid #3d3d3f; background: #2d2d2e; 
            color: white; outline: none; resize: none; box-sizing: border-box;
        }

        .action-row { display: flex; gap: 10px; width: 100%; }
        .main-btn { 
            flex: 1; padding: 20px; font-weight: bold; border-radius: 16px; 
            border: none; cursor: pointer; font-size: 1.1rem; transition: 0.3s; 
            background: #007bff; color: white; text-transform: uppercase;
        }
        .main-btn.online { background: #28a745; }
        
        .btn-buzz {
            width: 70px; background: #3c3c3e; border: 1px solid #444;
            border-radius: 16px; display: flex; align-items: center; 
            justify-content: center; font-size: 1.5rem; cursor: pointer; transition: 0.2s;
        }

        #log { 
            background: rgba(0,0,0,0.8); color: #00ff00; font-family: monospace; 
            font-size: 11px; padding: 12px; text-align: left; height: 70px; 
            overflow-y: auto; border-radius: 10px; border: 1px solid #333; width: 100%; box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header-row">
            <h2>S24 PAGER</h2>
            <div class="settings-btn-inline" onclick="disconnectDevice()">⚙️</div>
        </div>
        
        <canvas id="canvas" width="296" height="128"></canvas>
        
        <div id="progressContainer">
            <div id="progressBar"></div>
        </div>
        
        <textarea id="msgInput" placeholder="Message..." oninput="drawText()"></textarea>
        
        <div class="action-row">
            <button class="main-btn" id="actionBtn" onclick="handleAction()">Connect Pager</button>
            <div class="btn-buzz" onclick="vibrateTag()" title="Vibrate Motor">📳</div>
        </div>

        <div id="log">System: Ready</div>
    </div>

    <script>
        let bleDevice, epdCharacteristic;
        const SERVICE_UUID = '13187b10-eba9-a3ba-044e-83d3217d9a38';
        const CHAR_UUID = '4b646063-6264-f3a7-8941-e65356ea82fe';
        
        // 1. Pre-load the graphic correctly
        const sideImg = new Image();
        sideImg.src = '02.bmp'; 
        sideImg.onload = () => {
            console.log("Graphic loaded");
            drawText();
        };

        function addLog(m) {
            const l = document.getElementById('log');
            l.innerHTML += `> ${m}<br>`;
            l.scrollTop = l.scrollHeight;
        }

        function drawText() {
            const c = document.getElementById('canvas');
            const ctx = c.getContext('2d');
            const input = document.getElementById('msgInput').value || "S24 READY";
            
            // Clear to White
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, c.width, c.height);
            
            // 2. Draw Graphic 02.bmp (Persistent on left)
            if (sideImg.complete && sideImg.naturalWidth !== 0) {
                // We lock height to 100px to keep it clean on the 128px screen
                const h = 100; 
                const w = (sideImg.width / sideImg.height) * h;
                ctx.drawImage(sideImg, 10, (c.height - h) / 2, w, h);
            }

            // 3. Envelope Icon
            const iconX = c.width - 35, iconY = 12;
            ctx.strokeStyle = "black"; ctx.lineWidth = 2;
            ctx.strokeRect(iconX, iconY, 22, 14); 
            ctx.beginPath(); ctx.moveTo(iconX, iconY); ctx.lineTo(iconX + 11, iconY + 7); ctx.lineTo(iconX + 22, iconY); ctx.stroke();

            // 4. Text Rendering (Centered in the remaining space)
            const fontSize = 24;
            // The graphic takes up ~80-100px, so we center text in the right half
            const xCenter = 180; 
            ctx.fillStyle = "black";
            ctx.font = `bold ${fontSize}px Arial`;
            ctx.textAlign = "center"; ctx.textBaseline = "middle";

            const maxWidth = 180; // Bound the text so it doesn't hit the character
            const lineHeight = fontSize + 4;
            const inputLines = input.split('\n');
            let lines = [];
            
            inputLines.forEach(line => {
                let words = line.split(' '), tempLine = "";
                for (let n = 0; n < words.length; n++) {
                    let testLine = tempLine + words[n] + " ";
                    if (ctx.measureText(testLine).width > maxWidth && n > 0) {
                        lines.push(tempLine); tempLine = words[n] + " ";
                    } else { tempLine = testLine; }
                }
                lines.push(tempLine);
            });

            const totalHeight = lines.length * lineHeight;
            let startY = (c.height - totalHeight) / 2 + (lineHeight / 2);
            lines.forEach((line, i) => {
                ctx.fillText(line.trim(), xCenter, startY + (i * lineHeight));
            });
        }

        async function handleAction() {
            if (!bleDevice || !bleDevice.gatt.connected) {
                try {
                    addLog("Scanning...");
                    bleDevice = await navigator.bluetooth.requestDevice({
                        filters: [{ namePrefix: 'S24_' }],
                        optionalServices: [SERVICE_UUID]
                    });
                    const server = await bleDevice.gatt.connect();
                    const service = await server.getPrimaryService(SERVICE_UUID);
                    epdCharacteristic = await service.getCharacteristic(CHAR_UUID);
                    
                    document.getElementById('actionBtn').innerText = "Send to Pager";
                    document.getElementById('actionBtn').classList.add('online');
                    addLog("Connected: " + bleDevice.name);
                } catch (e) { addLog("Error: " + e.message); }
            } else {
                await upload_image();
            }
        }

        async function upload_image() {
            const canvas = document.getElementById('canvas');
            // Re-draw one last time to be safe
            drawText();
            
            document.getElementById('progressContainer').style.display = 'block';
            try {
                addLog("Sending image data...");
                await epdCharacteristic.writeValueWithResponse(hexToBytes("0000")); 
                await epdCharacteristic.writeValueWithResponse(hexToBytes("020000")); 
                
                const bwData = bytesToHex(canvas2bytes(canvas));
                await sendChunked(bwData, 'ff', 0);
                
                const redData = bytesToHex(canvas2bytes(canvas, 'bwr'));
                await sendChunked(redData, '00', 50);
                
                await epdCharacteristic.writeValueWithResponse(hexToBytes("0101"));
                addLog("Updated Display.");
                setTimeout(() => { document.getElementById('progressContainer').style.display = 'none'; }, 2000);
            } catch (e) { addLog("Fail: " + e.message); }
        }

        async function sendChunked(value, code, base) {
            const step = 480;
            for (let i = 0; i < value.length; i += step) {
                let cmd = "03" + code + intToHex(i / 2, 2) + value.substring(i, i + step);
                await epdCharacteristic.writeValueWithResponse(hexToBytes(cmd));
                document.getElementById('progressBar').style.width = (base + ((i / value.length) * 50)) + '%';
            }
        }

        async function vibrateTag() {
            if (!epdCharacteristic) return addLog("Connect first!");
            try {
                await epdCharacteristic.writeValueWithResponse(hexToBytes("0401"));
                addLog("Buzz command sent.");
            } catch (e) { addLog("Vibrate failed."); }
        }

        async function disconnectDevice() {
            if (bleDevice) await bleDevice.gatt.disconnect();
            addLog("Reset.");
            handleAction();
        }
    </script>
</body>
</html>
