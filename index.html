<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATC Retro Pager</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --primary: #3498db; --secondary: #2ecc71; --pager-bg: #1a1a1a; --lcd: #9ead86; }
        body { font-family: 'Courier New', monospace; background: #2c3e50; margin: 0; padding: 15px; color: white; }
        .pager-case { background: var(--pager-bg); border-radius: 20px; padding: 20px; border: 4px solid #333; box-shadow: 0 10px 0 #000; max-width: 400px; margin: auto; }
        .lcd-screen { background: var(--lcd); color: #222; padding: 15px; border-radius: 5px; border: 4px inset #777; min-height: 80px; margin-bottom: 20px; font-weight: bold; font-size: 1.2rem; text-transform: uppercase; }
        
        button { 
            width: 100%; padding: 15px; margin: 5px 0; border: none; border-radius: 50px; 
            font-weight: bold; cursor: pointer; background: #444; color: white; box-shadow: 0 4px 0 #222;
        }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #222; }
        .btn-connect { background: var(--primary); }
        .btn-send { background: var(--secondary); color: #111; }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; font-size: 1rem; }
        #status { font-size: 0.7rem; color: #888; text-align: center; margin-top: 10px; }
        #log { font-size: 0.6rem; color: #666; height: 40px; overflow: hidden; margin-top: 10px; }
        canvas { display: none; } /* Hidden canvas for text processing */
    </style>
</head>
<body>

    <div class="pager-case">
        <div class="lcd-screen" id="display-preview">READY...</div>
        
        <button id="connectbutton" class="btn-connect" onclick="preConnect();">POWER ON / CONNECT</button>
        
        <input type="text" id="pagerMsg" placeholder="ENTER MESSAGE..." maxlength="20" oninput="updatePreview()">
        <button class="btn-send" onclick="sendPagerText();">📟 SEND PAGE</button>
        
        <div id="status">OFFLINE</div>
        <div id="log"></div>
    </div>

    <canvas id="textCanvas" width="250" height="122"></canvas>

    <script>
        // --- ORIGINAL BLE LOGIC ---
        let bleDevice, gattServer, Theservice, writeCharacteristic;
        let imgArray = "", startTime = 0, uploadPart = 0;

        function updatePreview() {
            document.getElementById('display-preview').innerText = document.getElementById('pagerMsg').value || "READY...";
        }

        // DRAW TEXT TO BITMAP
        function sendPagerText() {
            const canvas = document.getElementById('textCanvas');
            const ctx = canvas.getContext('2d');
            const text = document.getElementById('pagerMsg').value;

            // 1. Clear & Draw
            ctx.fillStyle = "white"; // "White" is the background for E-paper
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "black";
            ctx.font = "bold 30px Arial";
            ctx.textAlign = "center";
            ctx.fillText(text, canvas.width/2, canvas.height/2 + 10);

            // 2. Convert to Hex Bitmap (Specific for ATC_TLSR_Paper)
            let hexData = canvasToHex(ctx, canvas.width, canvas.height);
            sendimg(hexData);
        }

        function canvasToHex(ctx, width, height) {
            let hex = "";
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x += 8) {
                    let byte = 0;
                    for (let bit = 0; bit < 8; bit++) {
                        let imgData = ctx.getImageData(x + bit, y, 1, 1).data;
                        // If pixel is dark, set bit to 0 (for e-paper)
                        if (imgData[0] < 128) byte |= (1 << (7 - bit));
                    }
                    hex += byte.toString(16).padStart(2, '0');
                }
            }
            return hex;
        }

        // --- BLE CORE (SAME AS BEFORE) ---
        function sendimg(cmdIMG) {
            startTime = new Date().getTime();
            imgArray = cmdIMG;
            uploadPart = 0;
            addLog('Sending Page...');
            sendCommand(hexToBytes("0000")).then(() => {
                sendCommand(hexToBytes("020000")).then(() => sendIMGpart());
            }).catch(handleError);
        }

        function sendIMGpart() {
            if (imgArray.length > 0) {
                let currentpart = "03" + imgArray.substring(0, 480);
                imgArray = imgArray.substring(480);
                setStatus('SENDING: ' + (uploadPart++) + "%");
                sendCommand(hexToBytes(currentpart)).then(() => sendIMGpart()).catch(handleError);
            } else {
                sendCommand(hexToBytes("01")).then(() => {
                    setStatus("PAGE SENT!");
                    addLog("Done.");
                });
            }
        }

        function preConnect() {
            navigator.bluetooth.requestDevice({ 
                optionalServices: ['13187b10-eba9-a3ba-044e-83d3217d9a38'], 
                acceptAllDevices: true 
            }).then(device => {
                bleDevice = device;
                addLog("Connecting...");
                return device.gatt.connect();
            }).then(server => {
                return server.getPrimaryService('13187b10-eba9-a3ba-044e-83d3217d9a38');
            }).then(service => {
                return service.getCharacteristic('4b646063-6264-f3a7-8941-e65356ea82fe');
            }).then(characteristic => {
                writeCharacteristic = characteristic;
                document.getElementById("connectbutton").innerHTML = "PAGER ONLINE";
                setStatus("CONNECTED");
            }).catch(err => addLog(err));
        }

        async function sendCommand(cmd) { if (writeCharacteristic) await writeCharacteristic.writeValue(cmd); }
        function setStatus(txt) { document.getElementById("status").innerHTML = txt; }
        function addLog(txt) { document.getElementById("log").innerHTML = txt; }
        function hexToBytes(hex) {
            let bytes = [];
            for (let c = 0; c < hex.length; c += 2) bytes.push(parseInt(hex.substr(c, 2), 16));
            return new Uint8Array(bytes);
        }
        function handleError(e) { console.log(e); setStatus("ERROR"); }
    </script>
</body>
</html>
