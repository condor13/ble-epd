<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>BLE Pager Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="dithering.js"></script>
    <script src="utils.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        #canvas { background: white; border: 4px solid #333; margin-bottom: 20px; border-radius: 8px; }
        input { width: 80%; padding: 15px; font-size: 1.2rem; border-radius: 8px; border: none; margin-bottom: 10px; }
        button { padding: 15px 30px; font-size: 1.1rem; font-weight: bold; border-radius: 8px; border: none; cursor: pointer; margin: 5px; }
        .btn-conn { background: #007bff; color: white; }
        .btn-send { background: #28a745; color: white; }
        #log { font-family: monospace; font-size: 0.8rem; color: #888; margin-top: 20px; height: 100px; overflow-y: auto; text-align: left; background: #000; padding: 10px; }
    </style>
</head>
<body>

    <h2>📟 BLE PAGER</h2>
    
    <canvas id="canvas" width="296" height="128"></canvas>
    
    <input type="text" id="msgInput" placeholder="Type message..." oninput="drawText()">
    
    <br>
    
    <button class="btn-conn" id="connBtn" onclick="preConnect()">1. CONNECT</button>
    <button class="btn-send" onclick="upload_image()">2. SEND TO TAG</button>

    <div id="log">Status: Ready...</div>

    <script>
        let bleDevice, gattServer, epdService, epdCharacteristic;
        const SERVICE_UUID = '13187b10-eba9-a3ba-044e-83d3217d9a38';
        const CHAR_UUID = '4b646063-6264-f3a7-8941-e65356ea82fe';

        function addLog(msg) {
            const log = document.getElementById('log');
            log.innerHTML += `> ${msg}<br>`;
            log.scrollTop = log.scrollHeight;
        }

        // Draws the text exactly how you want it on the tag
        function drawText() {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            const text = document.getElementById('msgInput').value || "PAGER READY";

            // Clean White Background
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Black Bold Text
            ctx.fillStyle = "black";
            ctx.font = "bold 40px Arial";
            ctx.textAlign = "center";
            ctx.fillText(text, canvas.width / 2, canvas.height / 2 + 15);
        }

        async function preConnect() {
            try {
                addLog("Searching...");
                bleDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'ATC' }],
                    optionalServices: [SERVICE_UUID],
                    acceptAllDevices: false
                });

                addLog("Connecting to " + bleDevice.name);
                gattServer = await bleDevice.gatt.connect();
                epdService = await gattServer.getPrimaryService(SERVICE_UUID);
                epdCharacteristic = await epdService.getCharacteristic(CHAR_UUID);
                
                document.getElementById('connBtn').innerText = "ONLINE";
                document.getElementById('connBtn').style.background = "#555";
                addLog("Connected Successfully.");
            } catch (e) {
                addLog("Error: " + e.message);
            }
        }

        // Ported from your original code to ensure compatibility
        async function sendCommand(cmd) {
            if (epdCharacteristic) {
                await epdCharacteristic.writeValueWithResponse(hexToBytes(cmd));
            }
        }

        async function sendBufferData(value, type) {
            let code = (type === 'bwr') ? '00' : 'ff';
            const step = 480;
            for (let i = 0; i < value.length; i += step) {
                // Logic: 03 (Command) + Type + Offset (2 bytes) + Hex Data
                await sendCommand("03" + code + intToHex(i / 2, 2) + value.substring(i, i + step));
            }
        }

        async function upload_image() {
            if (!epdCharacteristic) return addLog("Connect first!");
            
            const canvas = document.getElementById('canvas');
            const startTime = new Date().getTime();
            addLog("Preparing Image...");

            try {
                // Wake up & Init
                await sendCommand("0000");
                await sendCommand("020000");

                // Use the functions from your UTILS.JS
                // BW Buffer
                addLog("Transmitting BW...");
                await sendBufferData(bytesToHex(canvas2bytes(canvas)), 'bw');
                
                // Red Buffer (sending empty/white to avoid random red lines)
                addLog("Transmitting Red...");
                await sendBufferData(bytesToHex(canvas2bytes(canvas, 'bwr')), 'bwr');

                // Trigger Refresh
                addLog("Refreshing Tag...");
                await sendCommand("0101");
                
                addLog(`Done! (${(new Date().getTime() - startTime) / 1000}s)`);
            } catch (e) {
                addLog("Transmission Failed: " + e.message);
            }
        }

        // Initial draw
        drawText();
    </script>
</body>
</html>
