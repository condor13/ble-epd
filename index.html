<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATC E-Paper Control</title>
    <meta name="theme-color" content="#2c3e50">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        :root { --primary: #3498db; --secondary: #2ecc71; --dark: #2c3e50; --danger: #e74c3c; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; margin: 0; padding: 15px; color: var(--dark); }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 15px; }
        h2 { margin-top: 0; font-size: 1.2rem; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        button { 
            width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 8px; 
            font-weight: bold; cursor: pointer; transition: opacity 0.2s; font-size: 1rem;
        }
        button:active { opacity: 0.7; }
        .btn-connect { background: var(--primary); color: white; }
        .btn-send { background: var(--secondary); color: white; }
        .btn-clear { background: #95a5a6; color: white; }
        
        input, textarea { 
            width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; 
            border-radius: 6px; box-sizing: border-box; font-family: monospace; 
        }
        
        #status { font-size: 0.9rem; padding: 10px; background: #e8f4fd; border-left: 4px solid var(--primary); margin: 10px 0; }
        #log { 
            background: #1e1e1e; color: #adff2f; padding: 10px; border-radius: 6px; 
            font-size: 0.8rem; height: 120px; overflow-y: auto; font-family: 'Courier New', monospace;
        }
        label { font-size: 0.8rem; font-weight: bold; color: #7f8c8d; }
    </style>
</head>
<body>

    <div class="card">
        <h2>📡 Device Connection</h2>
        <button id="connectbutton" class="btn-connect" onclick="preConnect();">Connect to E-Paper</button>
        <button style="background: #34495e; color: white;" onclick="reConnect();">Force Reconnect</button>
        <div id="status">Ready to connect...</div>
    </div>

    <div class="card">
        <h2>🖼 Image Upload</h2>
        <label>Image Hex Data</label>
        <textarea id="cmdIMAGE" rows="5">0000000007fffffffffffffffffc00000000000007fffffffffffffffffc00000000000007fffffffffffffffffc0000</textarea>
        <button class="btn-send" onclick="sendimg(document.getElementById('cmdIMAGE').value);">Send Image to Paper</button>
    </div>

    <div class="card">
        <h2>🛠 Debugging</h2>
        <label>Command (Hex)</label>
        <input type="text" id="cmdTXT" value="0055">
        <button class="btn-send" style="background: var(--dark);" onclick="sendcmd(document.getElementById('cmdTXT').value);">Send CMD</button>
        <button class="btn-clear" onclick="document.getElementById('log').innerHTML = '';">Clear Log</button>
        <div id="log"></div>
    </div>

    <script>
        let bleDevice, gattServer, Theservice, writeCharacteristic;
        let reconnectTrys = 0, imgArray = "", startTime = 0, uploadPart = 0;

        function resetVariables() {
            gattServer = null; Theservice = null; writeCharacteristic = null;
            imgArray = ""; uploadPart = 0;
        }

        function handleError(error) {
            addLog("Error: " + error);
            resetVariables();
            if (!bleDevice) return;
            if (reconnectTrys <= 5) { reconnectTrys++; connect(); }
        }

        async function sendCommand(cmd) {
            if (writeCharacteristic) await writeCharacteristic.writeValue(cmd);
        }

        async function sendcmd(cmdTXT) {
            addLog('Sending CMD: ' + cmdTXT);
            await sendCommand(hexToBytes(cmdTXT));
        }

        function sendimg(cmdIMG) {
            startTime = new Date().getTime();
            imgArray = cmdIMG.replace(/(?:\r\n|\r|\n|,|0x| )/g, '');
            uploadPart = 0;
            addLog('Starting Image Transfer...');
            sendCommand(hexToBytes("0000")).then(() => {
                sendCommand(hexToBytes("020000")).then(() => sendIMGpart());
            }).catch(handleError);
        }

        function sendIMGpart() {
            if (imgArray.length > 0) {
                let currentpart = "03" + imgArray.substring(0, 480);
                imgArray = imgArray.substring(480);
                setStatus('Part: ' + (uploadPart++) + " | " + ((new Date().getTime() - startTime) / 1000.0).toFixed(1) + "s");
                sendCommand(hexToBytes(currentpart)).then(() => sendIMGpart()).catch(handleError);
            } else {
                sendCommand(hexToBytes("01")).then(() => {
                    let dur = ((new Date().getTime() - startTime) / 1000.0).toFixed(1);
                    setStatus("Complete! Time: " + dur + "s");
                    addLog("Transfer Finished.");
                });
            }
        }

        function preConnect() {
            if (bleDevice && bleDevice.gatt.connected) {
                bleDevice.gatt.disconnect();
            } else {
                navigator.bluetooth.requestDevice({ 
                    optionalServices: ['13187b10-eba9-a3ba-044e-83d3217d9a38'], 
                    acceptAllDevices: true 
                }).then(device => {
                    device.addEventListener('gattserverdisconnected', () => {
                        addLog("Disconnected");
                        document.getElementById("connectbutton").innerHTML = "Connect to E-Paper";
                    });
                    bleDevice = device;
                    connect();
                }).catch(handleError);
            }
        }

        function reConnect() {
            if (bleDevice) bleDevice.gatt.disconnect();
            resetVariables();
            setTimeout(connect, 300);
        }

        function connect() {
            if (!bleDevice) return;
            addLog("Connecting to " + bleDevice.name);
            bleDevice.gatt.connect()
                .then(server => { gattServer = server; return gattServer.getPrimaryService('13187b10-eba9-a3ba-044e-83d3217d9a38'); })
                .then(service => { Theservice = service; return Theservice.getCharacteristic('4b646063-6264-f3a7-8941-e65356ea82fe'); })
                .then(characteristic => {
                    writeCharacteristic = characteristic;
                    addLog("Connected & Ready");
                    document.getElementById("connectbutton").innerHTML = "Connected";
                    setStatus("Connected to " + bleDevice.name);
                }).catch(handleError);
        }

        function setStatus(txt) { document.getElementById("status").innerHTML = txt; }
        
        function addLog(txt) {
            let log = document.getElementById("log");
            log.innerHTML += `> ${txt}<br>`;
            log.scrollTop = log.scrollHeight;
        }

        function hexToBytes(hex) {
            let bytes = [];
            for (let c = 0; c < hex.length; c += 2) bytes.push(parseInt(hex.substr(c, 2), 16));
            return new Uint8Array(bytes);
        }
    </script>
</body>
</html>
