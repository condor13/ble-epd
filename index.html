<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>80s Retro Pager</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --case: #222; --lcd: #879771; --btn: #444; }
        body { background: #34495e; font-family: 'Courier New', monospace; display: flex; justify-content: center; padding: 20px; }
        
        /* The Pager Body */
        .pager { 
            background: var(--case); width: 320px; padding: 25px; border-radius: 15px;
            box-shadow: 0 10px 0 #111, 0 20px 20px rgba(0,0,0,0.5); border: 2px solid #444;
        }
        
        /* The LCD Screen */
        .screen-container { background: #000; padding: 10px; border-radius: 5px; margin-bottom: 20px; border: 3px inset #555; }
        .lcd { 
            background: var(--lcd); color: #2a3321; height: 100px; padding: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; font-weight: bold; text-align: center;
            text-transform: uppercase; line-height: 1.2; box-shadow: inset 2px 2px 5px rgba(0,0,0,0.3);
        }

        input { width: 100%; padding: 12px; border: none; border-radius: 5px; margin-bottom: 10px; box-sizing: border-box; font-family: 'Courier New'; font-weight: bold; }
        
        button { 
            width: 100%; padding: 15px; border: none; border-radius: 50px; color: white;
            font-weight: bold; cursor: pointer; margin-bottom: 10px;
            box-shadow: 0 4px 0 #111; transition: 0.1s;
        }
        button:active { transform: translateY(3px); box-shadow: 0 1px 0 #111; }
        
        .btn-blue { background: #2980b9; }
        .btn-green { background: #27ae60; }

        #log { color: #888; font-size: 0.7rem; text-align: center; margin-top: 10px; }
        canvas { display: none; } /* Hidden canvas used as the engine */
    </style>
</head>
<body>

    <div class="pager">
        <div class="screen-container">
            <div class="lcd" id="preview">READY...</div>
        </div>

        <button class="btn-blue" id="connBtn" onclick="connect()">CONNECT PAGER</button>
        
        <input type="text" id="msgInput" placeholder="ENTER MESSAGE..." maxlength="25" oninput="updatePreview()">
        
        <button class="btn-green" onclick="generateAndSend()">📟 SEND PAGE</button>
        
        <div id="log">STATUS: STANDBY</div>
    </div>

    <canvas id="engine" width="296" height="128"></canvas>

    <script>
        let writeChar;
        const SERVICE_UUID = '13187b10-eba9-a3ba-044e-83d3217d9a38';
        const CHAR_UUID = '4b646063-6264-f3a7-8941-e65356ea82fe';

        function updatePreview() {
            document.getElementById('preview').innerText = document.getElementById('msgInput').value || "READY...";
        }

        function addLog(msg) { document.getElementById('log').innerText = msg; }

        async function connect() {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'ATC' }],
                    optionalServices: [SERVICE_UUID]
                });
                addLog("Connecting...");
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                writeChar = await service.getCharacteristic(CHAR_UUID);
                addLog("PAGER ONLINE");
                document.getElementById('connBtn').innerText = "ONLINE";
            } catch (e) { addLog("Error: " + e.message); }
        }

        async function generateAndSend() {
            if (!writeChar) return addLog("CONNECT FIRST!");
            
            const canvas = document.getElementById('engine');
            const ctx = canvas.getContext('2d');
            const text = document.getElementById('msgInput').value;

            // Draw: Black Background, White Text (This often works better for inversion issues)
            ctx.fillStyle = "black"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            ctx.font = "bold 40px Arial";
            ctx.textAlign = "center";
            ctx.fillText(text, canvas.width/2, canvas.height/2 + 15);

            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            let hexString = "";
            
            // Core Logic: We are packing 8 pixels into 1 byte
            for (let i = 0; i < imgData.length; i += 4 * 8) {
                let byte = 0;
                for (let bit = 0; bit < 8; bit++) {
                    // INVERSION LOGIC: If pixel is bright (>128), set the bit
                    if (imgData[(i + bit * 4)] > 128) {
                        byte |= (1 << (7 - bit));
                    }
                }
                hexString += byte.toString(16).padStart(2, '0');
            }

            try {
                addLog("Waking tag...");
                await writeChar.writeValue(new Uint8Array([0x00, 0x00])); 
                await writeChar.writeValue(new Uint8Array([0x02, 0x00, 0x00])); 

                const step = 480; 
                for (let i = 0; i < hexString.length; i += step) {
                    // Header: 03 (Data) + 01 (Buffer Type) + Address (2 bytes)
                    let part = "0301" + intToHex16(i/2) + hexString.substring(i, i + step);
                    await writeChar.writeValue(hexToBytes(part));
                    addLog("Paging... " + Math.round((i/hexString.length)*100) + "%");
                }

                addLog("Finalizing...");
                // Refresh command 0101 triggers the hardware
                await writeChar.writeValue(new Uint8Array([0x01, 0x01])); 
                addLog("MESSAGE SENT");
            } catch (e) { addLog("Pager Error: " + e.message); }
        }

        function intToHex16(val) {
            let h = val.toString(16).padStart(4, '0');
            return h.substring(2,4) + h.substring(0,2); // Little Endian
        }

        function hexToBytes(hex) {
            let bytes = [];
            for (let c = 0; c < hex.length; c += 2) bytes.push(parseInt(hex.substr(c, 2), 16));
            return new Uint8Array(bytes);
        }
    </script>
</body>
</html>
